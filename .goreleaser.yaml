version: 2
project_name: sqlid
builds:
  - id: sqlid
    main: ./cmd/sqlid
    binary: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    no_unique_dist_dir: true
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
archives:
  - id: sqlid
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
checksum:
  name_template: checksums.txt
changelog:
  use: github
release:
  github:
    owner: sqlrest
    name: sqlid
